name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify tag version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag matches workspace version
        shell: bash
        run: |
          VERSION="$(awk -F'"' '/^\[workspace\.package\]/ { in_section=1; next } /^\[/ && in_section { exit } in_section && /^version = / { print $2; exit }' Cargo.toml)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$VERSION" ]; then
            echo "Failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match Cargo.toml version $VERSION" >&2
            exit 1
          fi

  build:
    name: Build release ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}-${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./package.sh --target "${{ matrix.target }}" --output-dir dist

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Target "${{ matrix.target }}" -OutputDir dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
