name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: skillctrl-desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Build desktop frontend
        run: |
          npm ci --prefix skillctrl-desktop --no-fund --no-audit
          npm run build --prefix skillctrl-desktop

      - name: Run tests
        if: runner.os == 'Linux'
        run: cargo test --workspace --locked

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./package.sh --target "${{ matrix.target }}" --output-dir dist

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Target "${{ matrix.target }}" -OutputDir dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillctrl-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
